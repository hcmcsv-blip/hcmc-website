<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Insights & Articles - HCMC Clinic Chiang Mai</title>
  <link rel="icon" type="image/png" href="images/hcmc-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            iceblue: { DEFAULT: '#D8ECF3', light: '#EBF6FA', dark: '#B0D9E7' },
            navy: { DEFAULT: '#0F172A', light: '#1E293B', slate: '#475569', tint: '#F8FAFC' },
            accent: { red: '#EF4444' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass-nav { background: rgba(255, 255, 255, 0.8); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
  </style>
</head>

<body class="bg-navy-tint text-navy font-sans antialiased min-h-screen pt-20">

  <header id="main-header" class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-slate-100 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="index03.html" class="flex items-center group">
        <img src="images/logo-2.png" alt="Health Care Medical Clinic" class="h-12 md:h-16 w-auto">
      </a>
      <nav class="hidden lg:flex items-center gap-8">
        <a href="index03.html#home" class="font-medium text-sm text-navy-slate hover:text-navy transition-colors">Home</a>
        <a href="index03.html#about" class="font-medium text-sm text-navy-slate hover:text-navy transition-colors">About Dr.M</a>
        <a href="index03.html#checkup" class="font-medium text-sm text-navy-slate hover:text-navy transition-colors">Check-up</a>
        <a href="index03.html#vaccination" class="font-medium text-sm text-navy-slate hover:text-navy transition-colors">Vaccination</a>
        <a href="index03.html#contact" class="font-medium text-sm text-navy-slate hover:text-navy transition-colors">Contact</a>
      </nav>
      <div class="flex items-center gap-4">
        <a href="index03.html#booking-section-anchor" class="px-5 py-2.5 text-xs font-semibold uppercase tracking-wider bg-navy text-white rounded-lg hover:bg-navy-light shadow-md transition-all">
          Book Appointment
        </a>
      </div>
    </div>
  </header>

  <section class="py-16 bg-white border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6">
      <div class="max-w-2xl flex flex-col gap-4">
        <span class="text-xs font-bold text-navy tracking-widest uppercase flex items-center gap-1.5">
          <i data-lucide="book-open" class="w-4 h-4"></i> HCMC Resource Center
        </span>
        <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight text-navy">
          Medical Insights & Health Knowledge
        </h1>
        <p class="text-navy-slate text-sm md:text-base leading-relaxed">
          คลังความรู้และบทความทางการแพทย์เชิงป้องกัน รวบรวมข้อมูลหลักฐานทางวิทยาศาสตร์และนวัตกรรมการดูแลสุขภาพเฉพาะบุคคล โดยคุณหมอนิสชล มอร์แกน
        </p>
      </div>
    </div>
  </section>

  <section class="py-16">
    <div class="max-w-7xl mx-auto px-6">
      <div id="archive-insights-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </div>
  </section>

  <div id="insight-modal" class="fixed inset-0 z-[110] flex items-center justify-center bg-slate-950/50 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-white p-6 md:p-8 rounded-3xl shadow-2xl max-w-2xl w-full mx-4 border border-slate-100 flex flex-col max-h-[85vh] transform scale-95 transition-transform duration-300">
      <div class="flex items-start justify-between border-b border-slate-100 pb-4 mb-4">
        <div>
          <span id="modal-vac-category" class="text-[10px] font-bold uppercase tracking-wider text-accent-red">Insight</span>
          <h3 id="modal-vac-title" class="font-extrabold text-xl md:text-2xl text-navy mt-1 leading-snug">Title</h3>
        </div>
        <button type="button" onclick="closeInsightModal()" class="p-2 text-slate-400 hover:text-navy hover:bg-slate-50 rounded-full transition-colors font-bold text-xl leading-none">&times;</button>
      </div>
      <div id="modal-vac-content" class="overflow-y-auto pr-2 max-h-[55vh] text-sm text-navy-slate"></div>
    </div>
  </div>

  <script type="module">
    import { insights } from './insights.js';

    function renderArchiveInsights() {
      const container = document.getElementById('archive-insights-container');
      if (!container) return;

      // วาดบทความทั้งหมดที่มีใน insights.js (ไม่มีการจำกัดจำนวนแถวและไม่มีสไลเดอร์)
      container.innerHTML = insights.map(item => `
        <div class="group bg-white border border-slate-200/80 rounded-3xl overflow-hidden shadow-xs flex flex-col justify-between transition-all duration-300 hover:shadow-md hover:-translate-y-1">
          <div>
            <div class="h-48 overflow-hidden bg-slate-200 relative">
              <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
            </div>
            <div class="p-6 flex flex-col gap-4">
              <div class="flex items-center justify-between text-[11px] font-bold uppercase tracking-wider">
                <span class="${item.categoryColorClass}">${item.categoryName}</span>
                <span class="text-slate-400 font-medium">${item.date}</span>
              </div>
              <h3 class="text-base font-extrabold text-navy leading-snug hover:text-navy-slate transition-colors line-clamp-2">
                <a href="javascript:void(0)" class="open-insight-link" data-id="${item.id}">${item.title}</a>
              </h3>
              <p class="text-xs text-navy-slate leading-relaxed line-clamp-3">
                ${item.excerpt}
              </p>
            </div>
          </div>
          <div class="px-6 pb-6 mt-auto">
            <div class="pt-4 border-t border-slate-100 flex items-center justify-between">
              <button type="button" data-id="${item.id}" class="open-insight-btn text-xs font-bold uppercase tracking-wider text-navy hover:text-navy-slate flex items-center gap-1.5">
                Read Insight <i data-lucide="arrow-right" class="w-3.5 h-3.5 transition-transform group-hover:translate-x-1"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      // ฟังก์ชันเปิดป๊อปอัปอ่านบทความฉบับเต็ม
      const openModal = (id) => {
        const item = insights.find(p => p.id == id);
        if (!item) return;
        document.getElementById('modal-vac-category').innerText = item.categoryName;
        document.getElementById('modal-vac-title').innerText = item.title;
        document.getElementById('modal-vac-content').innerHTML = item.fullContent;
        const modal = document.getElementById('insight-modal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.querySelector('.transform').classList.remove('scale-95');
      };

      container.querySelectorAll('.open-insight-btn, .open-insight-link').forEach(elem => {
        elem.addEventListener('click', () => openModal(elem.getAttribute('data-id')));
      });

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    window.closeInsightModal = function() {
      const modal = document.getElementById('insight-modal');
      modal.classList.add('opacity-0', 'pointer-events-none');
      modal.querySelector('.transform').classList.add('scale-95');
    }

    // สั่งรันระบบเมื่อโหลดหน้าเว็บสำเร็จ
    document.addEventListener("DOMContentLoaded", () => {
      renderArchiveInsights();
    });
  </script>

</body>
</html>
